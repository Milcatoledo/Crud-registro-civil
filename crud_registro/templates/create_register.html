{% extends "layout/base.html" %}
{% block content %}
<div>
    <h1>Registro Civil</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
            <button class="button-succes" type="submit">
                Crear <i class="fa-solid fa-user-plus"></i>
            </button>
            
            <a href="{% url 'index' %}">
                <button type="button" class="button-danger">
                    Cancelar
                </button>
            </a>
    </form>
</div>
{% endblock %}
